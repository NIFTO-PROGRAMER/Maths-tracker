<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths 70/80 | Mission CBSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000000; color: #ffffff; overflow-x: hidden; }
        .bento-card { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bento-card:hover { border-color: #f59e0b; box-shadow: 0 0 30px rgba(245, 158, 11, 0.1); }
        .accent-text { color: #f59e0b; }
        
        /* Custom Input Styles */
        input[type="date"], input[type="number"], textarea {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: border-color 0.2s;
        }
        input[type="date"]:focus, input[type="number"]:focus, textarea:focus {
            outline: none;
            border-color: #f59e0b;
        }
        /* Color overrides for date picker icon */
        ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SYLLABUS = [
            { layer: "Layer 1: Safety Net", marks: 29, chapters: ["Matrices & Determinants", "Linear Programming", "Vectors", "3D Geometry"] },
            { layer: "Layer 2: Logic Base", marks: 16, chapters: ["Probability", "Relations & Functions", "Inverse Trig"] },
            { layer: "Layer 3: Calculus", marks: 35, chapters: ["Continuity & Diff", "App. of Derivatives", "Integrals", "App. of Integrals", "Diff Equations"] },
            { layer: "Layer 4: Execution", marks: "Exam", chapters: ["PYQ Paper 1", "PYQ Paper 2", "PYQ Paper 3", "Marking Scheme Analysis"] }
        ];

        function App() {
            // State for Checklist
            const [progress, setProgress] = useState(() => {
                const saved = localStorage.getItem('math_70_progress');
                return saved ? JSON.parse(saved) : {};
            });

            // State for Daily Logs
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('math_70_logs');
                return saved ? JSON.parse(saved) : [];
            });

            // Form State
            const [dateInput, setDateInput] = useState(new Date().toISOString().split('T')[0]);
            const [hoursInput, setHoursInput] = useState('');
            const [notesInput, setNotesInput] = useState('');

            // Save to LocalStorage
            useEffect(() => {
                localStorage.setItem('math_70_progress', JSON.stringify(progress));
                localStorage.setItem('math_70_logs', JSON.stringify(logs));
                if (window.lucide) window.lucide.createIcons();
            }, [progress, logs]);

            // Handlers
            const toggleTask = (id) => {
                setProgress(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const handleSaveLog = () => {
                if (!dateInput || !hoursInput || !notesInput) {
                    alert("Fill out Date, Hours, and Notes before saving.");
                    return;
                }

                const existingIndex = logs.findIndex(l => l.date === dateInput);
                let newLogs = [...logs];

                if (existingIndex > -1) {
                    if(!window.confirm("You already have an entry for this date. Overwrite?")) return;
                    newLogs[existingIndex] = { date: dateInput, hours: parseFloat(hoursInput), notes: notesInput };
                } else {
                    newLogs.push({ date: dateInput, hours: parseFloat(hoursInput), notes: notesInput });
                }

                // Sort newest first
                newLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                setLogs(newLogs);
                setHoursInput('');
                setNotesInput('');
            };

            const deleteLog = (index) => {
                if(window.confirm("Delete this daily log?")) {
                    const newLogs = [...logs];
                    newLogs.splice(index, 1);
                    setLogs(newLogs);
                }
            };

            // Stats Calculation
            const stats = useMemo(() => {
                let totalTasks = 0;
                let doneTasks = 0;
                let totalHours = 0;

                SYLLABUS.forEach((section, sIdx) => {
                    section.chapters.forEach((chap, cIdx) => {
                        totalTasks++;
                        if (progress[`${sIdx}-${cIdx}`]) doneTasks++;
                    });
                });

                logs.forEach(log => {
                    totalHours += parseFloat(log.hours || 0);
                });

                return {
                    percent: Math.round((doneTasks / totalTasks) * 100) || 0,
                    tasksDone: doneTasks,
                    totalTasks: totalTasks,
                    totalHours: totalHours.toFixed(1)
                };
            }, [progress, logs]);

            return (
                <div className="min-h-screen p-4 md:p-8 lg:p-12 max-w-[1400px] mx-auto">
                    {/* Header */}
                    <header className="mb-12">
                        <div className="flex flex-col lg:flex-row justify-between items-end gap-8">
                            <div className="text-left">
                                <div className="inline-block px-3 py-1 rounded-md bg-amber-500/10 border border-amber-500/20 text-amber-500 text-[10px] font-bold tracking-[0.3em] uppercase mb-4">
                                    Layered Strategy Dashboard
                                </div>
                                <h1 className="text-5xl md:text-7xl font-bold tracking-tighter leading-none">
                                    MATHS<br/><span className="accent-text">70/80</span>
                                </h1>
                            </div>
                            
                            <div className="flex gap-4 w-full lg:w-auto overflow-x-auto pb-2 lg:pb-0">
                                <div className="bento-card p-5 rounded-2xl min-w-[140px] flex-1">
                                    <p className="text-slate-500 text-[9px] uppercase font-bold tracking-widest mb-1">Mastery</p>
                                    <p className="text-3xl md:text-4xl font-bold accent-text tabular-nums">{stats.percent}<span className="text-sm text-slate-500 ml-1">%</span></p>
                                </div>
                                <div className="bento-card p-5 rounded-2xl min-w-[140px] flex-1 border-l-4 border-l-amber-500">
                                    <p className="text-slate-500 text-[9px] uppercase font-bold tracking-widest mb-1">Total Grind</p>
                                    <p className="text-3xl md:text-4xl font-bold tabular-nums">{stats.totalHours}<span className="text-sm text-slate-500 ml-1">hrs</span></p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Layout Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* LEFT: Syllabus Tracker (Takes up 8 cols on large screens) */}
                        <div className="lg:col-span-8 space-y-6">
                            <h2 className="text-xl font-bold tracking-tight border-b border-white/10 pb-4">The Execution Roadmap</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {SYLLABUS.map((section, sIdx) => (
                                    <div key={section.layer} className="bento-card p-6 rounded-3xl flex flex-col">
                                        <h3 className="text-sm font-bold text-slate-200 mb-6 flex items-start justify-between">
                                            {section.layer}
                                            <span className="text-[10px] bg-white/5 px-2 py-1 rounded text-amber-500/80">{section.marks} {typeof section.marks === 'number' ? 'Marks' : ''}</span>
                                        </h3>
                                        <div className="space-y-2 mt-auto">
                                            {section.chapters.map((chap, cIdx) => {
                                                const id = `${sIdx}-${cIdx}`;
                                                const isDone = progress[id];
                                                return (
                                                    <button 
                                                        key={chap}
                                                        onClick={() => toggleTask(id)}
                                                        className={`w-full text-left p-3 rounded-xl flex items-center gap-3 text-xs font-medium transition-all ${isDone ? 'bg-amber-500/10 text-amber-500 border border-amber-500/20' : 'bg-white/[0.02] text-slate-400 border border-transparent hover:bg-white/[0.05]'}`}
                                                    >
                                                        <div className={`w-4 h-4 rounded-sm border flex flex-shrink-0 items-center justify-center transition-all ${isDone ? 'bg-amber-500 border-amber-500' : 'border-slate-700'}`}>
                                                            {isDone && <i data-lucide="check" className="text-black" style={{width: 12, height: 12}}></i>}
                                                        </div>
                                                        <span className="leading-snug">{chap}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* RIGHT: Daily Logging (Takes up 4 cols on large screens) */}
                        <div className="lg:col-span-4 space-y-6">
                            
                            {/* Input Form */}
                            <div className="bento-card p-6 rounded-3xl">
                                <h2 className="text-sm font-bold text-slate-200 mb-4 flex items-center gap-2">
                                    <i data-lucide="pen-tool" style={{width: 14, height: 14}} className="text-amber-500"></i>
                                    Log Session
                                </h2>
                                
                                <div className="space-y-4 text-sm">
                                    <div>
                                        <label className="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-2">Date</label>
                                        <input type="date" value={dateInput} onChange={(e) => setDateInput(e.target.value)} className="w-full p-2.5 rounded-lg text-xs" />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-2">Hours Studied</label>
                                        <input type="number" step="0.5" placeholder="e.g. 3.5" value={hoursInput} onChange={(e) => setHoursInput(e.target.value)} className="w-full p-2.5 rounded-lg text-xs placeholder:text-slate-700" />
                                    </div>

                                    <div>
                                        <label className="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-2">Topics Covered</label>
                                        <textarea rows="3" placeholder="Watched One-Shot, solved 10 NCERT examples..." value={notesInput} onChange={(e) => setNotesInput(e.target.value)} className="w-full p-2.5 rounded-lg text-xs resize-none placeholder:text-slate-700"></textarea>
                                    </div>

                                    <button onClick={handleSaveLog} className="w-full bg-amber-500 hover:bg-amber-400 text-black font-bold py-3 rounded-lg transition-colors text-xs uppercase tracking-wider mt-2">
                                        Commit Log
                                    </button>
                                </div>
                            </div>

                            {/* History Feed */}
                            <div className="bento-card p-6 rounded-3xl flex flex-col h-[400px]">
                                <h2 className="text-sm font-bold text-slate-200 mb-4 flex items-center gap-2">
                                    <i data-lucide="history" style={{width: 14, height: 14}} className="text-amber-500"></i>
                                    History
                                </h2>
                                
                                <div className="overflow-y-auto pr-2 flex-1 space-y-3">
                                    {logs.length === 0 ? (
                                        <p className="text-xs text-slate-600 italic">No data yet. Start the grind.</p>
                                    ) : (
                                        logs.map((log, idx) => (
                                            <div key={idx} className="bg-white/[0.02] border border-white/[0.05] p-3 rounded-xl relative group">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-[10px] font-bold text-amber-500">
                                                        {new Date(log.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                                    </span>
                                                    <span className="text-[10px] bg-black/50 px-2 py-0.5 rounded text-slate-400 font-mono">{log.hours}h</span>
                                                </div>
                                                <p className="text-xs text-slate-300 leading-relaxed">{log.notes}</p>
                                                <button onClick={() => deleteLog(idx)} className="absolute top-2 right-2 text-red-500/50 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                                                    <i data-lucide="x" style={{width: 12, height: 12}}></i>
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                        </div>
                    </div>

                    <footer className="mt-20 pt-8 border-t border-white/10 flex justify-between items-center text-slate-600">
                        <p className="text-[9px] uppercase tracking-[0.3em] font-bold">Utkarsh's Personal Dashboard</p>
                        <p className="text-[9px] italic">Data persists locally.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
